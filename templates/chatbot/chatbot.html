<!DOCTYPE html>
<html>
<head>
    <title>Apartment Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        #chat-box {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            padding: 15px;
            overflow-y: scroll;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .user-msg {
            color: #1a73e8;
            margin-bottom: 10px;
        }

        .bot-msg {
            color: #0b8043;
            margin-bottom: 10px;
        }

        #message-input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
        }
    </style>
</head>
<body>

<h2>Apartment Chatbot</h2>

<div id="chat-box"></div>

<form id="chat-form" method="POST">
    {% csrf_token %}
    <input type="text" name="message" id="message-input" placeholder="Ask something about apartments..." autocomplete="off">
    <button type="submit">Send</button>
</form>

<script>
document.getElementById("chat-form").onsubmit = async function(e) {
    e.preventDefault();

    const msg = document.getElementById("message-input").value;
    if (!msg.trim()) return;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="user-msg"><b>You:</b> ${msg}</div>`;

    const response = await fetch("", {
        method: "POST",
        headers: {
            "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
        },
        body: new FormData(document.getElementById("chat-form"))
    });

    const data = await response.json();

    chatBox.innerHTML += `<div class="bot-msg"><b>Bot:</b> ${data.reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    document.getElementById("message-input").value = "";
};
</script>

</body>
</html>
