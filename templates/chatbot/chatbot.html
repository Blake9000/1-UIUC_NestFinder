{% extends "base.html" %}

{% block title %}
  Apartment Search
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">

  <div class="row mb-4 justify-content-center">
    <div class="col-12 col-lg-8">
      <form id="apartment-search-form" method="POST">
        {% csrf_token %}

        <div class="card shadow-sm w-100">
          <div class="card-body">
            <h3 class="mb-3 text-center">Find Your Top 3 Apartments</h3>

            <div class="row g-2 justify-content-center align-items-center">
              <div class="col-12 col-md-7">
                <input
                  type="text"
                  name="message"
                  id="message-input"
                  class="form-control"
                  placeholder="Describe what you want, like: cat friendly under $900 near campus"
                  autocomplete="off"
                >
              </div>

              <div class="col-12 col-md-2">
                <select name="mode" id="mode-select" class="form-select">
                  <option value="local">Local</option>
                  <option value="api">API</option>
                </select>
              </div>

              <div class="col-12 col-md-2 d-grid">
                <button type="submit" id="search-button" class="btn btn-primary">
                  Search
                </button>
              </div>
            </div>

            <div id="loading-state" class="mt-3 text-muted text-center d-none">
              Searching and ranking apartments...
            </div>

            <div id="error-state" class="mt-3 text-danger text-center d-none"></div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Top 3 Matches</h4>
      </div>

      <div id="results-container">
        <div class="card border-0 bg-light">
          <div class="card-body text-center text-muted">
            Search to see recommendations.
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
document.getElementById("apartment-search-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const input = document.getElementById("message-input");
    const mode = document.getElementById("mode-select");
    const button = document.getElementById("search-button");
    const loadingState = document.getElementById("loading-state");
    const errorState = document.getElementById("error-state");
    const resultsContainer = document.getElementById("results-container");
    const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;

    const msg = input.value.trim();
    if (!msg) return;

    errorState.classList.add("d-none");
    errorState.textContent = "";

    loadingState.classList.remove("d-none");
    button.disabled = true;
    button.textContent = "Searching...";

    resultsContainer.innerHTML = `
      <div class="card border-0 bg-light">
        <div class="card-body text-center text-muted">
          Waiting for results...
        </div>
      </div>
    `;

    const formData = new FormData();
    formData.append("message", msg);
    formData.append("mode", mode.value);
    formData.append("csrfmiddlewaretoken", csrfToken);

    try {
        const response = await fetch("", {
            method: "POST",
            headers: {
                "X-CSRFToken": csrfToken
            },
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Search failed.");
        }

        loadingState.classList.add("d-none");

        if (!data.results || data.results.length === 0) {
            resultsContainer.innerHTML = `
              <div class="card border-0 bg-light">
                <div class="card-body text-center text-muted">
                  No matching apartments found.
                </div>
              </div>
            `;
            return;
        }

        const cards = data.results.slice(0, 3).map((apartment, index) => {
            const imageHtml = apartment.image
                ? `
                    <img
                      src="${apartment.image}"
                      alt="Listing image"
                      class="rounded border"
                      style="width:84px;height:84px;object-fit:cover;"
                    >
                  `
                : `
                    <div
                      class="rounded border d-flex align-items-center justify-content-center text-muted"
                      style="width:84px;height:84px;background:#f8f9fa;"
                    >
                      No Image
                    </div>
                  `;

            const bedroomBadge = apartment.bedrooms !== null && apartment.bedrooms !== undefined
                ? `<span class="badge text-bg-secondary">${apartment.bedrooms} bd</span>`
                : "";

            const bathroomBadge = apartment.bathrooms !== null && apartment.bathrooms !== undefined
                ? `<span class="badge text-bg-secondary">${apartment.bathrooms} ba</span>`
                : "";

            const sqftBadge = apartment.sqft_living
                ? `<span class="badge text-bg-secondary">${apartment.sqft_living} sqft</span>`
                : "";

            const amenityBadges = (apartment.amenities || []).map(amenity =>
                `<span class="badge text-bg-light border">${amenity}</span>`
            ).join("");

            return `
              <div class="card mb-3 position-relative">
                <div class="card-body">
                  <span class="badge text-bg-primary position-absolute top-0 end-0 m-3">
                    #${index + 1}
                  </span>

                  <div class="d-flex gap-3">
                    ${imageHtml}

                    <div class="flex-grow-1">
                      <h5 class="card-title mb-1">${apartment.name || "Unnamed listing"}</h5>
                      <div class="text-muted small mb-2">${apartment.address || "Address unavailable"}</div>

                      <div class="fw-bold mb-2">
                        ${apartment.price_display || '<span class="text-muted fw-normal">Price unknown</span>'}
                      </div>

                      <div class="d-flex flex-wrap gap-2 mb-2">
                        ${bedroomBadge}
                        ${bathroomBadge}
                        ${sqftBadge}
                      </div>

                      <div class="d-flex flex-wrap gap-2 mb-3">
                        ${amenityBadges}
                      </div>

                      <a href="${apartment.detail_url}" class="btn btn-primary btn-sm">
                        View Details
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            `;
        }).join("");

        resultsContainer.innerHTML = cards;

    } catch (error) {
        loadingState.classList.add("d-none");
        errorState.textContent = error.message;
        errorState.classList.remove("d-none");

        resultsContainer.innerHTML = `
          <div class="card border-0 bg-light">
            <div class="card-body text-center text-muted">
              No results to display.
            </div>
          </div>
        `;
    } finally {
        button.disabled = false;
        button.textContent = "Search";
    }
});
</script>
{% endblock %}
